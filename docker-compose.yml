version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: rezi_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: rezi
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: rezi_backend
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@db:5432/rezi
      SECRET_KEY: ${SECRET_KEY:-rezi-dev-secret-changez-en-prod}
      ENV: ${ENV:-development}
      ORANGE_MONEY_TOKEN: ${ORANGE_MONEY_TOKEN:-}
      MTN_MOMO_SUBSCRIPTION_KEY: ${MTN_MOMO_SUBSCRIPTION_KEY:-}
      WAVE_API_KEY: ${WAVE_API_KEY:-}
      CALLBACK_BASE_URL: ${CALLBACK_BASE_URL:-http://localhost:8000}
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        cd /app &&
        alembic upgrade head &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    image: nginx:alpine
    container_name: rezi_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
