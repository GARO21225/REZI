version: "3.9"
# ═══════════════════════════════════════════════════════
# REZI — Serveur de secours (Backup Server)
# Ce fichier déploie une instance miroir en lecture seule
# sur un second serveur. En cas de panne du serveur principal,
# pointer le DNS vers ce serveur en quelques minutes.
# ═══════════════════════════════════════════════════════

services:

  # ── Base de données répliquée (PostgreSQL Standby) ──
  db-standby:
    image: postgis/postgis:16-3.4
    container_name: rezi_db_standby
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: rezi
      # Réplication depuis le primaire
      PGUSER: replicator
      PGPASSWORD: ${REPLICATION_PASSWORD:-replpass}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_standby:/var/lib/postgresql/data
      - ./backup/pg_hba_standby.conf:/etc/postgresql/pg_hba.conf:ro
      - ./backup/recovery.conf:/var/lib/postgresql/data/recovery.conf:ro
    command: >
      bash -c "
        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          echo 'Clonage depuis le serveur primaire...'
          pg_basebackup -h ${PRIMARY_HOST:-primary-server} -U replicator -D /var/lib/postgresql/data -P -Xs -R
        fi
        docker-entrypoint.sh postgres -c 'hot_standby=on' -c 'wal_level=replica'
      "
    restart: unless-stopped
    networks:
      - rezi-backup

  # ── Backend en lecture seule (pointe sur standby) ──
  backend-standby:
    build: ./backend
    container_name: rezi_backend_standby
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@db-standby:5432/rezi
      SECRET_KEY: ${SECRET_KEY:-changez-moi}
      ENV: production
      READ_ONLY_MODE: "true"   # Désactive les écritures
    ports:
      - "8001:8000"
    depends_on:
      - db-standby
    restart: unless-stopped
    networks:
      - rezi-backup

  # ── Frontend miroir ──
  frontend-standby:
    image: nginx:alpine
    container_name: rezi_frontend_standby
    ports:
      - "3001:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./backup/nginx-standby.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - rezi-backup

  # ── Service de restauration automatique ──
  backup-watcher:
    image: alpine:3.19
    container_name: rezi_backup_watcher
    environment:
      PRIMARY_HOST: ${PRIMARY_HOST:-primary-server}
      CHECK_INTERVAL: "30"    # Vérifier toutes les 30 secondes
      ALERT_WEBHOOK: ${ALERT_WEBHOOK:-}
    volumes:
      - ./backup:/backup:ro
      - /opt/rezi/backups:/backups
    command: >
      sh -c "
        apk add --no-cache curl postgresql-client;
        while true; do
          if ! curl -sf http://${PRIMARY_HOST:-primary-server}:8000/health > /dev/null 2>&1; then
            echo 'ALERTE : Serveur primaire inaccessible !';
            [ -n '${ALERT_WEBHOOK}' ] && curl -s -X POST '${ALERT_WEBHOOK}' -H 'Content-type: application/json' -d '{\"text\":\"🚨 REZI PRIMAIRE DOWN ! Basculement vers serveur de secours.\"}';
          fi;
          sleep ${CHECK_INTERVAL};
        done
      "
    restart: unless-stopped
    networks:
      - rezi-backup

volumes:
  pgdata_standby:

networks:
  rezi-backup:
    driver: bridge
